# Recover the real client IP behind the external nginx-proxy. This server only
# ever sees the proxy as its peer (backend/app are not published — reaching :8080
# directly is not possible in prod), so X-Forwarded-For from it is trusted on the
# same basis as X-Forwarded-Proto. `real_ip_recursive on` walks the XFF list
# right-to-left, skipping the trusted (private) hops, to the true client. This
# makes $binary_remote_addr the real client for the login rate-limit below (else
# every operator would share the proxy's single IP bucket) and improves the
# X-Real-IP the backend logs. If the proxy's address is outside these ranges the
# directives are inert and it falls back to the peer IP — coarser, still safe.
real_ip_header X-Forwarded-For;
real_ip_recursive on;
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;

# Rate-limit the operator login endpoint (#64). The /login gate uses one shared
# operator password, so an unthrottled POST /api/auth/login is an online
# brute-force surface. This zone keys on the (real, per above) client IP; the
# matching location inside server{} applies it. http-context directive — this
# file is included inside http{} as conf.d/default.conf (see Dockerfile).
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
# Manual-import upload throttle: each POST triggers an outbound B24 `profile` call +
# a multipart parse before auth completes, so cap the rate to blunt amplification/DoS
# from an unauthenticated caller (a real multi-file drop is absorbed by burst).
limit_req_zone $binary_remote_addr zone=import:10m rate=20r/m;

server {
    # Port 8080: the image runs as the unprivileged `nginx` user (see Dockerfile),
    # which cannot bind to ports below 1024. The external nginx-proxy maps to it.
    listen 8080;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # TLS terminates at the external nginx-proxy; this server only sees plain
    # http on :8080. With the default `absolute_redirect on`, nginx builds
    # trailing-slash redirects (e.g. /settings → /settings/) from its own
    # scheme+port, emitting `Location: http://host:8080/...`. That leaks the
    # internal port and downgrades to http — inside a Bitrix24 HTTPS iframe it
    # triggers a Mixed-Content block and the in-portal page never loads.
    # Relative redirects let the browser keep the original https://host:443.
    absolute_redirect off;

    # Bitrix24 opens in-portal pages (and, later, install/placement handlers) with
    # a POST. nginx's static-file handler only allows GET/HEAD and answers POST with
    # `405 Not Allowed`, so the iframe page never renders. The pages have no
    # per-request server logic (SSG); the b24jssdk frame SDK reads the portal context
    # from `window.name` plus a postMessage handshake — it never reads the POST body.
    # So re-serving the same prerendered HTML on POST is sufficient: remap the
    # static 405 to a 200 that re-serves the same $uri.
    error_page 405 =200 $uri;

    # Backend API (Nitro node service) — same origin, so no CORS and the B24
    # webhook lives at https://<domain>/api/b24/events. The `backend` service must
    # be reachable on the shared docker network (see docker-compose.prod.yml).
    # `resolver` + a variable defer DNS resolution to request time, so nginx still
    # starts when the backend is briefly down (returns 502 instead of failing boot).
    # Server-only diagnostic (scripts/check-app-option.sh reaches it via
    # `docker compose exec backend`, i.e. localhost:3000 inside the container).
    # Not exposed publicly — the guard token is then only defense-in-depth.
    location = /api/b24/app-option-check {
        deny all;
    }

    # Queue observability (job counts) — server-only diagnostic, reached via
    # scripts/queue-stats.sh (docker compose exec). Guard token is defense-in-depth.
    location = /api/queues {
        deny all;
    }

    # Brute-force throttle for operator login (#64). An exact-match location wins
    # over the `location /api/` prefix, so it can't inherit the prefix's proxy
    # directives — they come from the shared snippet include (#100). burst=5 nodelay
    # absorbs a few quick retries (operator typos) served without delay, then returns
    # 429; sustained ~10/min per client IP makes an online password brute-force
    # impractical. Non-login /api/* is unaffected.
    location = /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;
        include snippets/proxy-backend.conf;
    }

    # Manual-import file upload (#P4). Exact-match so it doesn't inherit `location /api/`;
    # proxy directives + client_max_body_size come from the shared snippet. burst=10
    # nodelay absorbs a single multi-file drop; sustained ~20/min per IP throttles the
    # amplification/DoS vector (outbound `profile` call before auth). 429 on overflow.
    location = /api/import {
        limit_req zone=import burst=10 nodelay;
        limit_req_status 429;
        include snippets/proxy-backend.conf;
    }

    # Import-status poll (#5): same amplification vector as the upload (an outbound
    # `profile` call before auth) — and the in-portal UI POLLS it — so it needs the same
    # `import` zone throttle. The `= /api/import` block above is exact-match and does NOT
    # cover this sub-path, so it needs its own exact-match block (else it falls through to
    # the un-throttled `location /api/`). burst higher (a poll is a cheap GET).
    location = /api/import/status {
        limit_req zone=import burst=20 nodelay;
        limit_req_status 429;
        include snippets/proxy-backend.conf;
    }

    # Metrics dashboard (#78): same pre-auth outbound `profile` amplification vector as
    # the status poll (GET reads counters; POST resets them), so both need the `import`
    # zone throttle. Exact-match blocks — the `= /api/import` block does NOT cover these
    # sub-paths, and without their own block they'd fall through to the un-throttled
    # `location /api/`. burst matches the status poll (cheap GET / rare reset POST).
    location = /api/import/metrics {
        limit_req zone=import burst=20 nodelay;
        limit_req_status 429;
        include snippets/proxy-backend.conf;
    }
    location = /api/import/metrics-reset {
        limit_req zone=import burst=20 nodelay;
        limit_req_status 429;
        include snippets/proxy-backend.conf;
    }

    # Feedback channel (docs/FEEDBACK.md): POST /api/feedback validates a frame token (outbound
    # `profile` amplification) AND — on success — creates a GitHub issue in the private receiving
    # repo. Throttle so a portal user can't spam the repo / trip GitHub's content-creation limits.
    # Exact-match so it doesn't inherit the un-throttled `location /api/`; GET (the cheap enabled
    # probe) rides the same block, comfortably under the burst.
    location = /api/feedback {
        limit_req zone=import burst=10 nodelay;
        limit_req_status 429;
        include snippets/proxy-backend.conf;
    }

    # Bank OAuth connect start (stage 5, A7b-1): same pre-auth outbound amplification vector
    # as the import routes — it makes a `profile` REST call before the request is proven
    # authentic — so it needs the same `import` zone throttle. Exact-match; the
    # `location /api/` prefix below is un-throttled.
    location = /api/bank/connect {
        limit_req zone=import burst=10 nodelay;
        limit_req_status 429;
        include snippets/proxy-backend.conf;
    }

    # Bank OAuth callback (A7b-2): the top-level bank redirect landing. Auth is the signed state
    # in the query, but it does an unauthenticated-at-entry token-exchange REST call, so throttle
    # it with the same `import` zone (a signed state gates the exchange, but the endpoint is public).
    location = /api/bank/callback {
        limit_req zone=import burst=10 nodelay;
        limit_req_status 429;
        include snippets/proxy-backend.conf;
    }

    # Manual «Опросить сейчас» (#54): admin-gated on-demand poll trigger. Same pre-auth outbound
    # `profile` amplification vector as the import routes (a REST call before the frame token is
    # proven), so throttle with the `import` zone. Exact-match; the per-portal cooldown inside is a
    # separate layer (this only blunts raw hammering / the profile call).
    location = /api/poll-now {
        limit_req zone=import burst=10 nodelay;
        limit_req_status 429;
        include snippets/proxy-backend.conf;
    }

    # Readiness probe (#78): public, unauthenticated, but each hit does a real Postgres
    # SELECT 1 + a Redis PING (borrows a pooled DB connection) — a cheap-GET amplification
    # vector like the routes above, so throttle it with the same `import` zone. Exact-match;
    # the `location /api/` prefix below is un-throttled. (Liveness /api/health does no I/O,
    # so it stays on the un-throttled prefix.) burst high — an uptime monitor polls often.
    location = /api/ready {
        limit_req zone=import burst=20 nodelay;
        limit_req_status 429;
        include snippets/proxy-backend.conf;
    }

    location /api/ {
        include snippets/proxy-backend.conf;
    }

    # Dedicated host document for the embedded Bitrix24 CRM web-form
    # (public/b24-form.html, iframed by the landing). It loads the official B24
    # loader (inline bootstrap + cdn script), which the strict page CSP forbids —
    # so this one isolated file gets a form-scoped CSP that allows the B24 hosts
    # and inline/eval, WITHOUT loosening the rest of the site. nginx does not
    # inherit the server-level add_headers here, so security headers are repeated.
    location = /b24-form.html {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), serial=(), interest-cohort=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self' https://*.bitrix24.by https://*.bitrix24.ru https://*.bitrix24.com https://*.bitrix24.tech; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.bitrix24.by https://*.bitrix24.ru https://*.bitrix24.com https://*.bitrix24.tech; style-src 'self' 'unsafe-inline' https://*.bitrix24.by https://*.bitrix24.ru https://*.bitrix24.com; img-src 'self' data: https:; connect-src 'self' https://*.bitrix24.by https://*.bitrix24.ru https://*.bitrix24.com https://*.bitrix24.tech; font-src 'self' data: https:; frame-src https://*.bitrix24.by https://*.bitrix24.ru https://*.bitrix24.com; frame-ancestors 'self'; base-uri 'self';" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed Nuxt assets — immutable, long cache.
    # nginx does NOT inherit the server-level `add_header`s into a location that
    # has its own `add_header` (the cache header below) — so the security headers
    # that matter for a subresource are repeated here, otherwise JS/CSS would ship
    # without them. CSP and Permissions-Policy are document-scoped (inert on a .js
    # response), so they are intentionally not repeated.
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri =404;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), serial=(), interest-cohort=()" always;
    # No X-Frame-Options here: the in-portal pages (/app, /settings) run as a
    # Bitrix24 iframe app, so framing must be allowed for B24 portals.
    # X-Frame-Options can't express an allow-list — CSP frame-ancestors below
    # scopes framing to Bitrix24 cloud domains (self-hosted portals on a custom
    # domain must add their origin there).
    # HSTS: TLS terminates at the external nginx-proxy; force HTTPS for 1y including subdomains.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP without `script-src 'unsafe-inline'`: the two inline scripts Nuxt emits in
    # the HTML (the FOUC theme-init guard in app.vue and `window.__NUXT__.config`,
    # whose hash changes per build via buildId) are allow-listed by sha256 hashes
    # injected at build time by scripts/csp-hashes.mjs (it replaces the placeholder
    # token in the script-src directive below).
    # style-src keeps 'unsafe-inline' — Vue/b24ui emit inline style attributes.
    # Note: if adding location blocks with their own add_header, repeat security headers (nginx does not inherit).
    # frame-ancestors: who may embed us — Bitrix24 portals (cloud TLDs) + self.
    # connect-src: where the app may fetch — the backend API is now SAME-ORIGIN
    # (served at /api via the proxy above), so `'self'` already covers it; only the
    # B24 portal domains need listing (b24jssdk REST from the install handler).
    # Self-hosted/on-prem portals on a custom domain must add their origin to both
    # frame-ancestors and connect-src.
    # Yandex.Metrika: the counter loads tag.js from mc.yandex.ru (script-src),
    # beacons to it (connect-src) and drops a 1×1 pixel (img-src); webvisor may
    # open an iframe on it (frame-src). The inline counter snippet in the HTML is
    # allow-listed by its sha256 hash (script-src __CSP_SCRIPT_HASHES__, same as
    # theme-init). frame-src 'self' also covers the embedded CRM-form iframe
    # (public/b24-form.html, itself served with a form-scoped CSP above).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://mc.yandex.ru __CSP_SCRIPT_HASHES__; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://mc.yandex.ru; connect-src 'self' https://mc.yandex.ru https://mc.yandex.com https://*.bitrix24.ru https://*.bitrix24.by https://*.bitrix24.com https://*.bitrix24.eu https://*.bitrix24.kz https://*.bitrix24.ua https://*.bitrix24.de https://*.bitrix24.fr https://*.bitrix24.it https://*.bitrix24.pl https://*.bitrix24.es https://*.bitrix24.uk https://*.bitrix24.com.br https://*.bitrix24.com.tr https://*.bitrix24.mx https://*.bitrix24.co https://*.bitrix24.cn https://*.bitrix24.in https://*.bitrix24.id https://*.bitrix24.jp https://*.bitrix24.vn https://*.bitrix24.tech; font-src 'self'; object-src 'none'; frame-src 'self' https://mc.yandex.ru; frame-ancestors 'self' https://*.bitrix24.ru https://*.bitrix24.by https://*.bitrix24.com https://*.bitrix24.eu https://*.bitrix24.kz https://*.bitrix24.ua https://*.bitrix24.de https://*.bitrix24.fr https://*.bitrix24.it https://*.bitrix24.pl https://*.bitrix24.es https://*.bitrix24.uk https://*.bitrix24.com.br https://*.bitrix24.com.tr https://*.bitrix24.mx https://*.bitrix24.co https://*.bitrix24.cn https://*.bitrix24.in https://*.bitrix24.id https://*.bitrix24.jp https://*.bitrix24.vn https://*.bitrix24.tech; base-uri 'self';" always;
}
