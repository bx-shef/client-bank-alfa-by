server {
    # Port 8080: the image runs as the unprivileged `nginx` user (see Dockerfile),
    # which cannot bind to ports below 1024. The external nginx-proxy maps to it.
    listen 8080;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # TLS terminates at the external nginx-proxy; this server only sees plain
    # http on :8080. With the default `absolute_redirect on`, nginx builds
    # trailing-slash redirects (e.g. /settings → /settings/) from its own
    # scheme+port, emitting `Location: http://host:8080/...`. That leaks the
    # internal port and downgrades to http — inside a Bitrix24 HTTPS iframe it
    # triggers a Mixed-Content block and the in-portal page never loads.
    # Relative redirects let the browser keep the original https://host:443.
    absolute_redirect off;

    # Bitrix24 opens in-portal pages (and, later, install/placement handlers) with
    # a POST. nginx's static-file handler only allows GET/HEAD and answers POST with
    # `405 Not Allowed`, so the iframe page never renders. The pages have no
    # per-request server logic (SSG); the b24jssdk frame SDK reads the portal context
    # from `window.name` plus a postMessage handshake — it never reads the POST body.
    # So re-serving the same prerendered HTML on POST is sufficient: remap the
    # static 405 to a 200 that re-serves the same $uri.
    error_page 405 =200 $uri;

    # Backend API (Nitro node service) — same origin, so no CORS and the B24
    # webhook lives at https://<domain>/api/b24/events. The `backend` service must
    # be reachable on the shared docker network (see docker-compose.prod.yml).
    # `resolver` + a variable defer DNS resolution to request time, so nginx still
    # starts when the backend is briefly down (returns 502 instead of failing boot).
    # Server-only diagnostic (scripts/check-app-option.sh reaches it via
    # `docker compose exec backend`, i.e. localhost:3000 inside the container).
    # Not exposed publicly — the guard token is then only defense-in-depth.
    location = /api/b24/app-option-check {
        deny all;
    }

    # Queue observability (job counts) — server-only diagnostic, reached via
    # scripts/queue-stats.sh (docker compose exec). Guard token is defense-in-depth.
    location = /api/queues {
        deny all;
    }

    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Webhook bodies are small; keep the proxy snappy.
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed Nuxt assets — immutable, long cache.
    # nginx does NOT inherit the server-level `add_header`s into a location that
    # has its own `add_header` (the cache header below) — so the security headers
    # that matter for a subresource are repeated here, otherwise JS/CSS would ship
    # without them. CSP and Permissions-Policy are document-scoped (inert on a .js
    # response), so they are intentionally not repeated.
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri =404;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), serial=(), interest-cohort=()" always;
    # No X-Frame-Options here: the in-portal pages (/app, /settings) run as a
    # Bitrix24 iframe app, so framing must be allowed for B24 portals.
    # X-Frame-Options can't express an allow-list — CSP frame-ancestors below
    # scopes framing to Bitrix24 cloud domains (self-hosted portals on a custom
    # domain must add their origin there).
    # HSTS: TLS terminates at the external nginx-proxy; force HTTPS for 1y including subdomains.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP without `script-src 'unsafe-inline'`: the two inline scripts Nuxt emits in
    # the HTML (the FOUC theme-init guard in app.vue and `window.__NUXT__.config`,
    # whose hash changes per build via buildId) are allow-listed by sha256 hashes
    # injected at build time by scripts/csp-hashes.mjs (it replaces the placeholder
    # token in the script-src directive below).
    # style-src keeps 'unsafe-inline' — Vue/b24ui emit inline style attributes.
    # Note: if adding location blocks with their own add_header, repeat security headers (nginx does not inherit).
    # frame-ancestors: who may embed us — Bitrix24 portals (cloud TLDs) + self.
    # connect-src: where the app may fetch — the backend API is now SAME-ORIGIN
    # (served at /api via the proxy above), so `'self'` already covers it; only the
    # B24 portal domains need listing (b24jssdk REST from the install handler).
    # Self-hosted/on-prem portals on a custom domain must add their origin to both
    # frame-ancestors and connect-src.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' __CSP_SCRIPT_HASHES__; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://*.bitrix24.ru https://*.bitrix24.by https://*.bitrix24.com https://*.bitrix24.eu https://*.bitrix24.kz https://*.bitrix24.ua https://*.bitrix24.de https://*.bitrix24.fr https://*.bitrix24.it https://*.bitrix24.pl https://*.bitrix24.es https://*.bitrix24.com.br; font-src 'self'; object-src 'none'; frame-ancestors 'self' https://*.bitrix24.ru https://*.bitrix24.by https://*.bitrix24.com https://*.bitrix24.eu https://*.bitrix24.kz https://*.bitrix24.ua https://*.bitrix24.de https://*.bitrix24.fr https://*.bitrix24.it https://*.bitrix24.pl https://*.bitrix24.es https://*.bitrix24.com.br; base-uri 'self';" always;
}
