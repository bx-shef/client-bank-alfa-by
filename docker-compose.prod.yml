# Продакшн — разместить на сервере в /home/bitrix/bank-import/
# Требует:
#   - docker network proxy-net (создаётся nginx-proxy setup —
#     см. currency-converter/docker-compose.nginxproxy.yml);
#   - запущенный Watchtower на хосте (тоже из currency-converter) — он один на
#     сервер и сам подхватит контейнеры по метке watchtower.enable ниже.
#   - .env с DOMAIN, LETSENCRYPT_EMAIL, POSTGRES_PASSWORD, B24_TOKEN_ENC_KEY
#     (B24_APPLICATION_TOKEN — опционален: см. .env.example и комментарий у сервиса backend).
# Свой Watchtower здесь НЕ поднимаем: второй экземпляр конфликтует по
# container_name и плодит двойные перезапуски (см. docs/DEPLOY.md).
#
# Один домен, две роли: nginx `app` отдаёт статику лендинга/UI и проксирует
# /api/* в `backend` (Nitro) — поэтому вебхук B24 живёт на https://<DOMAIN>/api/b24/events
# без CORS. Наружу (nginx-proxy) смотрит только `app`; backend и db — во внутренней сети.

services:
  app:
    image: ghcr.io/bx-shef/client-bank-alfa-by:latest
    container_name: client-bank-alfa-by
    # 8080: the image runs nginx unprivileged (non-root) on 8080.
    expose:
      - "8080"
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 8080
      LETSENCRYPT_HOST: ${DOMAIN}
      # Per-vhost ACME contact email; overrides acme-companion's global
      # DEFAULT_EMAIL. Empty is allowed (cert issued without an account email).
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - proxy-net   # fronted by the external nginx-proxy
      - internal    # to reach `backend` for the /api/ proxy_pass
    depends_on:
      # best-effort ordering; nginx.conf resolves `backend` lazily and returns 502
      # if it's briefly down, so app never fails to start on backend readiness.
      - backend
    labels:
      # Picked up by the single host-wide Watchtower (deployed once with
      # currency-converter, runs with --label-enable).
      - "com.centurylinklabs.watchtower.enable=true"

  backend:
    image: ghcr.io/bx-shef/client-bank-alfa-by-backend:latest
    container_name: client-bank-alfa-by-backend
    # No host port and NOT on proxy-net — reached only via app's /api/ proxy_pass.
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/app
      # AES-256-GCM key for portal refresh tokens at rest. Required — no default.
      B24_TOKEN_ENC_KEY: ${B24_TOKEN_ENC_KEY:?set B24_TOKEN_ENC_KEY (openssl rand -hex 32)}
      # application_token is delivered INSIDE ONAPPINSTALL (per portal) and stored
      # write-once; later events are verified against that stored value. So leave
      # this EMPTY for multi-tenant — the first install bootstraps trust. It's used
      # here only as the shared guard token for the server-only diagnostics
      # (/api/queues, /api/b24/app-option-check); set it to enable those.
      B24_APPLICATION_TOKEN: ${B24_APPLICATION_TOKEN:-}
      # App OAuth creds — refresh portal access token for server-side REST (optional
      # for a just-installed portal, required for long-lived operation).
      B24_CLIENT_ID: ${B24_CLIENT_ID:-}
      B24_CLIENT_SECRET: ${B24_CLIENT_SECRET:-}
      # Redis DSN for the BullMQ pipeline (events → fetch → parse → crm-sync). Reached
      # only on the isolated `queuenet`; no auth needed inside the private network.
      REDIS_URL: redis://redis:6379
      # Cron poll interval (minutes) and load-demo size. DEMO_LOAD_N>0 enqueues that
      # many synthetic fetch jobs each tick so you can watch the pipeline (0 = off).
      CRON_INTERVAL_MIN: ${CRON_INTERVAL_MIN:-5}
      DEMO_LOAD_N: ${DEMO_LOAD_N:-0}
    # Liveness: hit the public /api/health endpoint (busybox wget ships in alpine).
    # Makes `docker compose ps` show backend health at a glance.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal   # reached by app's /api proxy + outbound to B24/Alfa
      - dbnet       # to reach Postgres
      - queuenet    # to reach Redis (BullMQ)
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Redis — backing store for the BullMQ pipeline. Only on `queuenet` (internal:
  # true): no host port, no egress, reachable solely by backend/worker. Durable
  # (appendonly) so queued jobs survive a restart.
  redis:
    image: redis:7-alpine
    container_name: client-bank-alfa-by-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - queuenet

  db:
    image: postgres:16-alpine
    container_name: client-bank-alfa-by-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - dbnet

volumes:
  pgdata:
  redisdata:

networks:
  proxy-net:
    external: true
  # app ↔ backend, and the backend's outbound to Bitrix24/Alfa (so NOT internal).
  internal:
    driver: bridge
  # backend ↔ Postgres only. `internal: true` — no outbound: the DB is fully
  # isolated (can't be reached from outside and can't initiate egress).
  dbnet:
    driver: bridge
    internal: true
  # backend/worker ↔ Redis only. `internal: true` — Redis has no host port and
  # no egress; it never leaves this private network. Other stacks can't see it.
  queuenet:
    driver: bridge
    internal: true
