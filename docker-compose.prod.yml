# Продакшн — разместить на сервере в /home/bitrix/bank-import/
# Требует:
#   - docker network proxy-net (создаётся nginx-proxy setup —
#     см. currency-converter/docker-compose.nginxproxy.yml);
#   - запущенный Watchtower на хосте (тоже из currency-converter) — он один на
#     сервер и сам подхватит контейнеры по метке watchtower.enable ниже.
#   - .env с DOMAIN, LETSENCRYPT_EMAIL, POSTGRES_PASSWORD, B24_TOKEN_ENC_KEY
#     (B24_APPLICATION_TOKEN — опционален: см. .env.example и комментарий у сервиса backend).
# Свой Watchtower здесь НЕ поднимаем: второй экземпляр конфликтует по
# container_name и плодит двойные перезапуски (см. docs/DEPLOY.md).
#
# Один домен, две роли: nginx `app` отдаёт статику лендинга/UI и проксирует
# /api/* в `backend` (Nitro) — поэтому вебхук B24 живёт на https://<DOMAIN>/api/b24/events
# без CORS. Наружу (nginx-proxy) смотрит только `app`; backend и db — во внутренней сети.

services:
  app:
    image: ghcr.io/bx-shef/client-bank-alfa-by:latest
    container_name: client-bank-alfa-by
    # 8080: the image runs nginx unprivileged (non-root) on 8080.
    expose:
      - "8080"
    environment:
      VIRTUAL_HOST: ${DOMAIN}
      VIRTUAL_PORT: 8080
      LETSENCRYPT_HOST: ${DOMAIN}
      # Per-vhost ACME contact email; overrides acme-companion's global
      # DEFAULT_EMAIL. Empty is allowed (cert issued without an account email).
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - proxy-net   # fronted by the external nginx-proxy
      - internal    # to reach `backend` for the /api/ proxy_pass
    depends_on:
      # best-effort ordering; nginx.conf resolves `backend` lazily and returns 502
      # if it's briefly down, so app never fails to start on backend readiness.
      - backend
    labels:
      # Picked up by the single host-wide Watchtower (deployed once with
      # currency-converter, runs with --label-enable).
      - "com.centurylinklabs.watchtower.enable=true"

  backend:
    image: ghcr.io/bx-shef/client-bank-alfa-by-backend:latest
    container_name: client-bank-alfa-by-backend
    # No host port and NOT on proxy-net — reached only via app's /api/ proxy_pass.
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/app
      # AES-256-GCM key for portal refresh tokens at rest. Required — no default.
      B24_TOKEN_ENC_KEY: ${B24_TOKEN_ENC_KEY:?set B24_TOKEN_ENC_KEY (openssl rand -hex 32)}
      # application_token is delivered INSIDE ONAPPINSTALL (per portal) and stored
      # write-once; later events are verified against that stored value. So leave
      # this EMPTY for multi-tenant — the first install bootstraps trust. It's used
      # here only as the shared guard token for the server-only diagnostics
      # (/api/queues, /api/b24/app-option-check); set it to enable those.
      B24_APPLICATION_TOKEN: ${B24_APPLICATION_TOKEN:-}
      # App OAuth creds — refresh portal access token for server-side REST (optional
      # for a just-installed portal, required for long-lived operation).
      B24_CLIENT_ID: ${B24_CLIENT_ID:-}
      B24_CLIENT_SECRET: ${B24_CLIENT_SECRET:-}
      # Redis DSN for the BullMQ pipeline (events → fetch → parse → crm-sync). Reached
      # only on the isolated `queuenet`; no auth needed inside the private network.
      REDIS_URL: redis://redis:6379
      # Operator login for the service zone (/queues …). Empty PASS ⇒ zone OPEN (no
      # login). Set PASS to close it; SESSION_SECRET is the independent HMAC signing
      # key (required in prod, must NOT be derived from the password). See docs/AUTH.md.
      PUBLIC_PAGE_BASIC_AUTH_USER: ${PUBLIC_PAGE_BASIC_AUTH_USER:-operator}
      PUBLIC_PAGE_BASIC_AUTH_PASS: ${PUBLIC_PAGE_BASIC_AUTH_PASS:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      # Cron poll interval (minutes) for real polling. Load demo: DEMO_LOAD_N>0
      # enqueues that many synthetic fetch jobs every DEMO_TICK_SEC seconds, with a
      # DEMO_DELAY_MS per-job pause (demo accounts only) so the /queues chart shows a
      # visible backlog. 0 = off. See docs/QUEUES.md.
      CRON_INTERVAL_MIN: ${CRON_INTERVAL_MIN:-5}
      DEMO_LOAD_N: ${DEMO_LOAD_N:-0}
      DEMO_TICK_SEC: ${DEMO_TICK_SEC:-5}
      DEMO_DELAY_MS: ${DEMO_DELAY_MS:-600}
      # Queue role: this container serves the API + runs the cron scheduler + the single
      # `b24-events` worker (install/uninstall — kept on one instance for ordering), but
      # does NOT process fetch/parse/crm-sync — those are drained by the `worker` service
      # below (scale it for throughput). RUN_MIGRATION stays on (default) so backend owns
      # the schema. ⚠ With QUEUE_WORKERS=0, the `worker` service MUST be up — else webhooks
      # /imports enqueue fine (Redis is up) and then sit undrained SILENTLY. Bring the WHOLE
      # compose up (`docker compose -f docker-compose.prod.yml up -d`), don't hand-edit only
      # this env; verify via /queues or scripts/queue-stats.sh after deploy.
      QUEUE_WORKERS: "0"
    # Makes `docker compose ps` show backend health at a glance.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal   # reached by app's /api proxy + outbound to B24/Alfa
      - dbnet       # to reach Postgres
      - queuenet    # to reach Redis (BullMQ)
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Worker — drains the BullMQ queues (events/fetch/parse/crm-sync). Same image as
  # backend, but role = worker-only: QUEUE_CRON=0 (cron runs on backend) and
  # RUN_MIGRATION=0 (schema owned by backend). No container_name / no ports so it can
  # be scaled: `docker compose up -d --scale worker=N` (or bump `deploy.replicas`).
  # All replicas pull from the same Redis — each job goes to exactly one worker, so
  # adding replicas adds throughput (see docs/QUEUES.md «Масштабирование»).
  worker:
    image: ghcr.io/bx-shef/client-bank-alfa-by-backend:latest
    environment:
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/app
      B24_TOKEN_ENC_KEY: ${B24_TOKEN_ENC_KEY:?set B24_TOKEN_ENC_KEY (openssl rand -hex 32)}
      B24_CLIENT_ID: ${B24_CLIENT_ID:-}
      B24_CLIENT_SECRET: ${B24_CLIENT_SECRET:-}
      REDIS_URL: redis://redis:6379
      # Role: process jobs, don't schedule, don't migrate.
      QUEUE_CRON: "0"
      RUN_MIGRATION: "0"
      # Per-worker parallelism for fetch/parse/crm-sync (default 1). Raise with care:
      # crm-sync is REST-bound and B24 limits are per-portal — batch first (docs/QUEUES.md).
      QUEUE_CONCURRENCY: ${QUEUE_CONCURRENCY:-1}
      # Activity carrier (#259 Phase B): `todo` (default) or `configurable` (B24-side dedup
      # via crm.activity.configurable.add). OFF by default — live-verify on an OAuth portal
      # before flipping (pnpm activity:test). crm-sync runs here, so this is the deciding copy.
      ACTIVITY_TRANSPORT: ${ACTIVITY_TRANSPORT:-todo}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    # Give an in-flight crm-sync REST job time to finish on scale-down before SIGKILL
    # (Docker default is 10s). A killed job is re-queued anyway (at-least-once + dedup),
    # but draining cleanly avoids needless retries.
    stop_grace_period: 30s
    # Scale knob. NB: plain `docker compose up` IGNORES `deploy.replicas` (Swarm/
    # `--compatibility` only) — the real knob is `docker compose up -d --scale worker=N`.
    deploy:
      replicas: 1
    depends_on:
      db:
        condition: service_healthy
      # Start after backend (which owns the migration). NB: `service_started` fires when
      # backend's process starts, NOT when its async migration finished — so a worker
      # could briefly hit a not-yet-created table; BullMQ retry (attempts:3, backoff)
      # covers that window against the idempotent CREATE TABLE IF NOT EXISTS.
      backend:
        condition: service_started
    networks:
      - internal   # outbound to B24/Alfa for REST writes
      - dbnet      # Postgres (token store, dedup)
      - queuenet   # Redis (BullMQ)
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Redis — backing store for the BullMQ pipeline. Only on `queuenet` (internal:
  # true): no host port, no egress, reachable solely by backend/worker. Durable
  # (appendonly) so queued jobs survive a restart.
  redis:
    image: redis:7-alpine
    container_name: client-bank-alfa-by-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - queuenet

  db:
    image: postgres:16-alpine
    container_name: client-bank-alfa-by-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - dbnet

volumes:
  pgdata:
  redisdata:

networks:
  proxy-net:
    external: true
  # app ↔ backend, and the backend's outbound to Bitrix24/Alfa (so NOT internal).
  internal:
    driver: bridge
  # backend ↔ Postgres only. `internal: true` — no outbound: the DB is fully
  # isolated (can't be reached from outside and can't initiate egress).
  dbnet:
    driver: bridge
    internal: true
  # backend/worker ↔ Redis only. `internal: true` — Redis has no host port and
  # no egress; it never leaves this private network. Other stacks can't see it.
  queuenet:
    driver: bridge
    internal: true
