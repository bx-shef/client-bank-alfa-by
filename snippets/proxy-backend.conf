# Shared backend (Nitro) proxy directives — included by BOTH `location /api/` and
# the exact-match `location = /api/auth/login`. An exact (`=`) location does not
# inherit the prefix location's directives, so without this include the block would
# be copied and the two could silently drift (#100). Per-location extras that are
# NOT shared (the login rate-limit `limit_req`/`limit_req_status`) stay in nginx.conf.
#
# `resolver` + a variable upstream defer DNS to request time, so nginx still boots
# when the backend is briefly down (returns 502 instead of failing to start).
resolver 127.0.0.11 valid=30s;
set $backend_upstream http://backend:3000;
proxy_pass $backend_upstream;
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
# Webhook/API bodies are small; keep the proxy snappy.
proxy_read_timeout 30s;
# Manual statement upload (POST /api/import) carries the file — allow up to the app's
# MAX_UPLOAD_BYTES (2 МБ) + multipart overhead; nginx default (1m) would 413 a 2МБ file.
client_max_body_size 3m;
