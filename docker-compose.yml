services:
  # Static landing + in-portal iframe UI (nginx). Unchanged by the backend.
  app:
    build:
      context: .
      args:
        NUXT_PUBLIC_AUTHOR_NAME: ${NUXT_PUBLIC_AUTHOR_NAME:-}
        NUXT_PUBLIC_AUTHOR_URL: ${NUXT_PUBLIC_AUTHOR_URL:-}
    # Host port 8081 (not 80) so this can run alongside currency-converter's local
    # compose on the same dev machine. Prod uses `expose` behind nginx-proxy (no clash).
    ports:
      - "8081:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Backend (Node): Bitrix24 webhook endpoint /api/b24/events + portal token store.
  # The B24 event handler URL during install points here (e.g. behind nginx-proxy).
  backend:
    build:
      context: .
      target: backend
    environment:
      DATABASE_URL: postgres://app:app@db:5432/app
      # application_token of the registered B24 app. REQUIRED IN PROD — without it
      # the first install is trusted on faith (TOFU); the backend logs a WARNING
      # when it bootstraps. Left optional (`:-`) only for local/dev. See docs/B24_EVENTS.md.
      B24_APPLICATION_TOKEN: ${B24_APPLICATION_TOKEN:-}
      # 32-byte key (hex/base64) encrypting portal refresh tokens at rest.
      # Required — no default, so secrets are never encrypted with a known key.
      B24_TOKEN_ENC_KEY: ${B24_TOKEN_ENC_KEY:?set B24_TOKEN_ENC_KEY (openssl rand -hex 32)}
      # App OAuth creds — refresh portal access token for server-side REST (optional locally).
      B24_CLIENT_ID: ${B24_CLIENT_ID:-}
      B24_CLIENT_SECRET: ${B24_CLIENT_SECRET:-}
      # Redis DSN for the BullMQ pipeline (events → fetch → parse queues).
      REDIS_URL: redis://redis:6379
    ports:
      - "3210:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Postgres: per-portal OAuth token store (table portal_tokens, auto-created on boot).
  # `db` exposes no host port — reachable only on the compose network. The default
  # app/app credentials are for local dev; the prod compose MUST set a strong
  # POSTGRES_PASSWORD (require it via `:?`, like B24_TOKEN_ENC_KEY).
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Redis — backing store for the BullMQ pipeline (events/fetch/parse queues).
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
