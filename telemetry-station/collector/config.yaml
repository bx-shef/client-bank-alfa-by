# OpenTelemetry Collector config for the shared telemetry station (#78, docs/OBSERVABILITY.md).
# Receives OTLP (traces/metrics/logs) from ALL apps, scrubs sensitive attributes as a
# belt-and-suspenders (apps already scrub at source), and writes to ClickHouse (72h TTL).
# Auth: every OTLP push must carry `Authorization: Bearer <OTEL_COLLECTOR_AUTH_TOKEN>`.

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  bearertokenauth:
    token: "${env:OTEL_COLLECTOR_AUTH_TOKEN}"

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        auth:
          authenticator: bearertokenauth
      http:
        endpoint: 0.0.0.0:4318
        auth:
          authenticator: bearertokenauth

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
    send_batch_max_size: 2048
  # Second line of PII defense (apps scrub at source; this guarantees it even for a
  # misconfigured client). Drop attributes that can carry SQL text / URLs+tokens / bodies.
  transform:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - delete_key(attributes, "db.statement")
          - delete_key(attributes, "db.query.text")
          - delete_key(attributes, "http.url")
          - delete_key(attributes, "url.full")
          - delete_key(attributes, "url.query")
          - delete_key(attributes, "url.path")
          - delete_key(attributes, "http.target")
          - delete_key(attributes, "http.route")
    # Same scrub on the logs pipeline (universal belt-and-suspenders, not traces-only).
    log_statements:
      - context: log
        statements:
          - delete_key(attributes, "db.statement")
          - delete_key(attributes, "db.query.text")
          - delete_key(attributes, "http.url")
          - delete_key(attributes, "url.full")
          - delete_key(attributes, "url.query")
          - delete_key(attributes, "url.path")
          - delete_key(attributes, "http.target")
          - delete_key(attributes, "http.route")

exporters:
  clickhouse:
    endpoint: tcp://clickhouse:9000?dial_timeout=10s
    database: otel
    username: default
    password: "${env:CLICKHOUSE_PASSWORD}"
    # Wall-clock retention of raw telemetry (matches the B24 starter). Tune per your disk.
    ttl: 72h
    create_schema: true
    traces_table_name: otel_traces
    metrics_table_name: otel_metrics
    logs_table_name: otel_logs
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s

service:
  extensions: [health_check, bearertokenauth]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [transform, batch]
      exporters: [clickhouse]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse]
    logs:
      receivers: [otlp]
      processors: [transform, batch]
      exporters: [clickhouse]
