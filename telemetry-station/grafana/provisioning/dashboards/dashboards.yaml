# Load dashboard JSONs from /var/lib/grafana/dashboards into a "Telemetry" folder.
apiVersion: 1

providers:
  - name: telemetry
    orgId: 1
    folder: Telemetry
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
