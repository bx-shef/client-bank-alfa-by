  # Ready-to-enable template: there is no Dockerfile yet (config-only scaffold),
  # so this block is commented out — Dependabot's docker ecosystem would have
  # nothing to scan. UNCOMMENT it the moment a Dockerfile lands with the deploy
  # artifacts; no other change is needed.
