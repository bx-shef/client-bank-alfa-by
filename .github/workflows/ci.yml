name: CI/CD

# Single pipeline so the deploy is gated on a green CI:
#   PR   → ci + docker-build (validate the image builds, no registry push)
#   main → ci → deploy (build + push to GHCR; Watchtower picks it up ~5 min)
#
# The job name `ci` is the required status check referenced by the `protect-main`
# ruleset (see docs/REPO_SETUP_CHECKLIST.md).
#
# Third-party actions are pinned to a full commit SHA (issue #2): a mutable tag
# can be overwritten by the action owner to inject code that runs on the runner
# with GITHUB_TOKEN (supply-chain RCE; cf. tj-actions/changed-files CVE-2025-30066).
# The `# vX.Y.Z` comment is what the `github-actions` Dependabot ecosystem reads to
# keep these SHAs current (see .github/dependabot.yml) — so pinning costs no manual upkeep.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  # Cancel only superseded PR runs; never abort an in-flight `main` deploy
  # mid-push to GHCR.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

# CI never takes screenshots, so don't let the `playwright` devDependency pull a
# browser during install. Visual verification uses the pre-installed Chromium in
# the dev/web environment (see docs/VISUAL_VERIFICATION.md).
env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

jobs:
  ci:
    name: ci
    runs-on: ubuntu-24.04
    # The `nuxt` Vitest project boots a Nuxt runtime on top of lint/typecheck/generate.
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        # Version is read from the "packageManager" field in package.json.

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Nuxt
        run: pnpm exec nuxi prepare
        # Generates .nuxt/eslint.config.mjs and .nuxt/tsconfig.json that the
        # lint / typecheck steps depend on.

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Type check
        run: pnpm typecheck

      - name: Build (nuxt generate)
        run: pnpm generate

  docker-build:
    name: docker-build
    # Validate BOTH production images build on every PR: the nginx static landing
    # (`runner`) and the Nitro node backend (`backend`). Catches Dockerfile /
    # base-image breakage before it reaches main and the GHCR deploy. No push.
    # Runs on Dependabot PRs too — that is exactly where a node bump would surface.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      matrix:
        target: [runner, backend]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image (no push)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha,scope=${{ matrix.target }}

  deploy:
    name: Build & Push to GHCR
    needs: ci
    # Gate the deploy on CI: a red CI blocks images from ever reaching GHCR /
    # Watchtower. Only the main branch deploys. Publishes two images:
    #   runner  → ghcr.io/<repo>           (nginx static landing + B24-iframe UI)
    #   backend → ghcr.io/<repo>-backend   (Nitro node: B24 webhooks + token store)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write  # required to push to ghcr.io

    strategy:
      matrix:
        include:
          - target: runner
            suffix: ''
          - target: backend
            suffix: '-backend'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # built-in, no extra secret needed

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}${{ matrix.suffix }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NUXT_PUBLIC_AUTHOR_NAME=${{ vars.NUXT_PUBLIC_AUTHOR_NAME }}
            NUXT_PUBLIC_AUTHOR_URL=${{ vars.NUXT_PUBLIC_AUTHOR_URL }}
            NUXT_PUBLIC_SITE_URL=${{ vars.NUXT_PUBLIC_SITE_URL }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
